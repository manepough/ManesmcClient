name: Build Manes APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make local gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          gradle wrapper --gradle-version=8.4 --distribution-type=bin -p /tmp/stub || true
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          cd /tmp && unzip -q g.zip
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version=8.4 --project-dir=$GITHUB_WORKSPACE

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Manes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
