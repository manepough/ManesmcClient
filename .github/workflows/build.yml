name: Build Manes APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate gradlew in temp folder
        run: |
          mkdir /tmp/wrapper
          cd /tmp/wrapper
          echo "plugins {}" > build.gradle
          gradle wrapper --gradle-version 8.6
          cp gradlew $GITHUB_WORKSPACE/
          cp gradlew.bat $GITHUB_WORKSPACE/
          cp -r gradle/wrapper $GITHUB_WORKSPACE/gradle/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Manes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
